name: code-style

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-code-styling:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PHP code style
        uses: aglipanci/laravel-pint-action@2.3.1
        with:
          testMode: true